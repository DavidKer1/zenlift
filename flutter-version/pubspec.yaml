name: zenlift
description: "Flutter migration of the Zenlift local-first workout tracker."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  go_router: ^17.2.3
  flutter_riverpod: ^3.3.1
  drift: ^2.33.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.5
  intl: ^0.20.2
  uuid: ^4.5.3
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.33.0
  build_runner: ^2.15.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/exercise.json
    - assets/images/exercises/
