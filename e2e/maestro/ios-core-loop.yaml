appId: ${APP_ID}
---
- launchApp:
    clearState: true
- startRecording: ${ARTIFACT_DIR}/ios-core-loop
- tapOn: "Saltar onboarding"
- tapOn: "Routines"
- tapOn: "Crear primera rutina"
- tapOn: "Nombre de la rutina"
- inputText: "Agent Smoke iOS"
- tapOn: "Agregar dia a la rutina"
- tapOn: "Agregar ejercicio al dia 1"
- tapOn: "Buscar ejercicios"
- inputText: "Bench Press"
- tapOn: "Seleccionar ejercicio Bench Press"
- assertVisible: "Configurar ejercicio"
- tapOn: "Series objetivo"
- eraseText
- inputText: "2"
- tapOn: "Repeticiones minimas"
- eraseText
- inputText: "8"
- tapOn: "Repeticiones maximas"
- eraseText
- inputText: "10"
- tapOn: "Confirmar configuracion de ejercicio"
- tapOn: "Crear rutina"
- assertVisible: "Agent Smoke iOS"
- tapOn: "Iniciar workout para Dia 1"
- assertVisible: "Finalizar entrenamiento"
- tapOn: "Agregar set"
- tapOn: "Peso set 1"
- inputText: "40"
- tapOn: "Repeticiones set 1"
- inputText: "8"
- tapOn: "Completar set 1"
- tapOn: "Agregar set"
- tapOn: "Peso set 2"
- inputText: "42.5"
- tapOn: "Repeticiones set 2"
- inputText: "8"
- tapOn: "Completar set 2"
- tapOn: "Finalizar entrenamiento"
- tapOn: "Finalizar"
- assertVisible: "Entrenamiento completado"
- takeScreenshot: ${ARTIFACT_DIR}/ios-core-loop-complete
- stopRecording
